{% extends 'base.html' %}

{% block title %}Login - Campus Hire{% endblock %}

{% block content %}
<section class="ch-login-wrap">
    <div class="container ch-login-items">
        <div class="brand"><h1><span class="ch-blue">Campus</span> Hire</h1></div>

        <div class="login-card">
            <h2 class="h3"><span class="ch-blue">Login</span></h2>
            {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <div class="form-flex">
                    <label class="checkbox">
                        <input type="checkbox" name="remember">
                        Remember Me
                    </label>
                    <p><a href="#">Forgot Password?</a></p>
                </div>
                <button type="submit" class="primary-btn">Login</button>
            </form>
            <div class="signup-link">
                <p>Don't have an account? <a href="{% url 'signup' %}" class="ch-blue">Sign Up</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}

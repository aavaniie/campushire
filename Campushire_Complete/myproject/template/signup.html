{% extends 'base.html' %}

{% block title %}Sign Up - Campus Hire{% endblock %}

{% block content %}
<section class="ch-login-wrap">
    <div class="container ch-login-items">
        <div class="brand"><h1><span class="ch-blue">Campus</span> Hire</h1></div>

        <div class="login-card">
            <h2 class="h3"><span class="ch-blue">Sign Up</span></h2>
            {% if error %}<p style="color:red;margin-bottom:1rem;">{{ error }}</p>{% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required>
                </div>
                <div class="form-group">
                    <label>Select Role</label>
                    <select name="role" required>
                        <option value="student">Student</option>
                        <option value="recruiter">Recruiter</option>
                    </select>
                </div>
                <button type="submit" class="primary-btn">Sign Up</button>
            </form>
            <div class="signup-link">
                <p>Already have an account? <a href="{% url 'login' %}" class="ch-blue">Login</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}

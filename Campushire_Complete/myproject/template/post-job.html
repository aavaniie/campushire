{% extends 'base.html' %}

{% block title %}Post Job - Campus Hire{% endblock %}

{% block content %}
<div class="ch-dashboard-container">
    <aside class="ch-dashboard-sidebar">
        <div class="brand"><h2><span class="ch-blue">Campus</span> Hire</h2></div>
        <nav>
            <ul>
                <li><a href="{% url 'recruiter-dashboard' %}">Dashboard</a></li>
                <li class="active"><a href="{% url 'postjob' %}">Post Job</a></li>
                <li><a href="{% url 'view-jobs' %}">My Jobs</a></li>
                <li><a href="{% url 'viewst' %}">Applicants</a></li>
                <li><a href="{% url 'ranks' %}">Leaderboard</a></li>
                <li><a href="{% url 'logout' %}" style="color:#ef4444;">Logout</a></li>
            </ul>
        </nav>
    </aside>

    <main class="ch-dashboard-main">
        <h1 class="h2">Post a New Job</h1>

        <section class="ch-dashboard-section">
            <form method="post" style="display:flex;flex-direction:column;gap:1rem;">
                {% csrf_token %}
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" name="title" placeholder="Frontend Developer" required style="background:#1e1e1f;color:#fff;border:1px solid #444;">
                </div>
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" name="company" placeholder="TechNova Pvt Ltd" required style="background:#1e1e1f;color:#fff;border:1px solid #444;">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" name="location" placeholder="Bangalore, India" required style="background:#1e1e1f;color:#fff;border:1px solid #444;">
                </div>
                <div class="form-group">
                    <label>Job Type</label>
                    <select name="job_type" required style="background:#1e1e1f;color:#fff;border:1px solid #444;">
                        <option value="full-time">Full-time</option>
                        <option value="internship">Internship</option>
                        <option value="part-time">Part-time</option>
                        <option value="remote">Remote</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Skills Required</label>
                    <input type="text" name="skills_required" placeholder="HTML, CSS, React" required style="background:#1e1e1f;color:#fff;border:1px solid #444;">
                </div>
                <div class="form-group">
                    <label>Job Description</label>
                    <textarea name="description" rows="5" placeholder="Describe the job role..." required style="background:#1e1e1f;color:#fff;border:1px solid #444;border-radius:0.5rem;padding:0.5rem;"></textarea>
                </div>
                <div class="form-group">
                    <label>Application Deadline</label>
                    <input type="date" name="deadline" style="background:#1e1e1f;color:#fff;border:1px solid #444;">
                </div>
                <button type="submit" class="primary-btn">Post Job</button>
            </form>
        </section>
    </main>
</div>
{% endblock %}
